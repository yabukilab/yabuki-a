      <p>東京油組総本店は、油そばの専門店です。スープを使わず、特製のタレと麺を混ぜ合わせて食べるスタイルが特徴です。豊富なトッピングとカスタマイズ可能なメニューで人気があります。千葉工業大学からも近く同じ値段で麺の量のが増やせるのでお勧めです。</p>
