<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喫茶店からす</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="hero">
        <h1>喫茶店からす</h1>
        <p>津田沼の隠れ家的な喫茶店で、ゆったりとした時間を。</p>
    </header>

    <main>
        <section class="about">
            <h2>お店について</h2>
            <p>
                「喫茶店からす」は、津田沼駅から徒歩5分に位置する静かなカフェです。
                レトロな雰囲気の店内では、美味しいコーヒーと自家製スイーツを楽しめます。
            </p>
        </section>

        <section class="gallery">
            <h2>ギャラリー</h2>
            <div class="gallery-grid">
                <img src="exterior.jpg" alt="喫茶店からすの外観">
                <img src="coffee.jpg" alt="喫茶店のコーヒー">
                <img src="cake.jpg" alt="自家製スイーツ">
            </div>
        </section>

        <section class="info">
            <h2>店舗情報</h2>
            <p><strong>住所:</strong> 千葉県船橋市津田沼1-2-3</p>
            <p><strong>営業時間:</strong> 10:00 - 20:00</p>
            <p><strong>定休日:</strong> 火曜日</p>
            <p><strong>お問い合わせ:</strong> 047-123-4567</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 喫茶店からす</p>
    </footer>
</body>
</html>
