<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カキもビールも生がスキ</title>
    <link rel="stylesheet" href="牡蠣.ccs">
</head>
<body>
    <header class="hero">
        <h1>カキもビールも生がスキ</h1>
        <p>新鮮なカキとビールを楽しめる津田沼の人気店！</p>
    </header>

    <main>
        <!-- お店の紹介セクション -->
        <section class="about">
            <h2>お店について</h2>
            <p>
                津田沼駅から徒歩5分に位置する「カキもビールも生がスキ」は、厳選された新鮮なカキと、種類豊富なビールが自慢のお店です。リラックスした雰囲気の店内で、美味しい料理をお楽しみください。
            </p>
        </section>

        <!-- メニュー画像 -->
        <section class="menu">
            <h2>メニュー</h2>
            <img src="menu.jpg" alt="お店のメニュー">
        </section>

        <!-- ギャラリーセクション -->
        <section class="gallery">
            <h2>ギャラリー</h2>
            <div class="gallery-grid">
                <img src="dish1.jpg" alt="溶岩パスタ">
                <img src="dish2.jpg" alt="彩り豊かなカプレーゼ">
            </div>
        </section>

        <!-- 店舗情報 -->
        <section class="info">
            <h2>店舗情報</h2>
            <p><strong>住所:</strong> 千葉県船橋市津田沼1-2-3</p>
            <p><strong>営業時間:</strong> 17:00 - 23:00</p>
            <p><strong>定休日:</strong> 月曜日</p>
            <p><strong>お問い合わせ:</strong> 047-123-4567</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 カキもビールも生がスキ</p>
    </footer>
</body>
</html>
