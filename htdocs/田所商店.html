    <h1>田所商店</h1>

    <p>日本古来の食文化「味噌」にこだわり、全国各地の味噌を使用する「味噌ラーメン」専門店です。</p>
    <ul>
        <li>雰囲気
            <p>店内の雰囲気は薄暗めですが、店に入るといろいろな種類の入った味噌樽が置かれており、店内だけでも他と異なる雰囲気を楽しめる
            </p>
        </li>
        <li>味
            <p>津田沼店では「北海道味噌」、「信州味噌」、「九州麦味噌」が楽しめる</p>
            <br>
        </li>
        <li>金額</li>
      </ul>
